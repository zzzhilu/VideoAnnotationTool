<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Annotation Tool</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="Local-first video annotation tool — draw frame-by-frame annotations on video with zero uploads.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── LANDING / DROP ZONE ─── -->
  <section id="landing" class="landing">
    <div class="landing-inner">
      <div class="landing-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <h1>Video Annotator</h1>
      <p class="landing-sub">Drop a video file or click to browse.<br>Everything stays on your machine — zero uploads.</p>
      <label class="file-label" for="videoInput">
        <span>Choose Video</span>
        <input type="file" id="videoInput" accept="video/*,.mov,.mkv,.avi,.m4v,.webm,.mp4" hidden>
      </label>
    </div>
  </section>

  <!-- ─── WORKSPACE ─── -->
  <main id="workspace" class="workspace hidden">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <div id="tabBar" class="tab-bar">
          <!-- JS renders tab items here -->
        </div>
        <button id="btnAddVideo" class="icon-btn" title="Add another video">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <input type="file" id="addVideoInput" accept="video/*,.mov,.mkv,.avi,.m4v,.webm,.mp4" hidden>
      </div>
      <div class="topbar-right">
        <button id="btnImport" class="text-btn">Import JSON</button>
        <button id="btnExport" class="text-btn accent">Export JSON</button>
        <input type="file" id="importInput" accept=".json" hidden>
      </div>
    </header>

    <!-- VIDEO + CANVAS CONTAINER -->
    <div class="stage-wrapper" id="stageWrapper">
      <!-- Drop overlay for adding new tab -->
      <div id="dropOverlay" class="drop-overlay hidden">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Drop to add new tab</span>
      </div>
      <div id="stage" class="stage">
        <video id="video" preload="auto" playsinline></video>
        <div id="canvasContainer"></div>

        <!-- DRAWING INDICATOR -->
        <div id="drawIndicator" class="draw-indicator hidden">
          <span class="draw-dot"></span> Draw Mode
        </div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <!-- LEFT: PLAYBACK -->
      <div class="ctrl-group">
        <button id="btnPrevFrame" class="icon-btn" title="Previous frame (←)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="19 20 9 12 19 4"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
        </button>
        <button id="btnPlay" class="play-btn" title="Play / Pause (Space)">
          <svg id="iconPlay" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="iconPause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button id="btnNextFrame" class="icon-btn" title="Next frame (→)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 4 15 12 5 20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
        </button>
      </div>

      <!-- CENTER: TIMELINE -->
      <div class="ctrl-timeline">
        <span id="timeCurrent" class="timecode">00:00.0</span>
        <div class="timeline-wrapper">
          <div id="timelineMarkers" class="timeline-markers"></div>
          <input type="range" id="timeline" class="timeline" min="0" max="100" step="0.01" value="0">
        </div>
        <span id="timeDuration" class="timecode">00:00.0</span>
      </div>

      <!-- RIGHT: DRAW TOOLS -->
      <div class="ctrl-group draw-tools">
        <div class="color-palette" id="colorPalette">
          <button class="color-swatch" data-color="#FAFF00" style="--sw:#FAFF00" title="Yellow"></button>
          <button class="color-swatch active" data-color="#FF3B3B" style="--sw:#FF3B3B" title="Red"></button>
          <button class="color-swatch" data-color="#00E676" style="--sw:#00E676" title="Green"></button>
          <button class="color-swatch" data-color="#40C4FF" style="--sw:#40C4FF" title="Cyan"></button>
          <button class="color-swatch" data-color="#FFFFFF" style="--sw:#FFFFFF" title="White"></button>
        </div>
        <button id="btnUndo" class="icon-btn" title="Undo last stroke (Ctrl+Z)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button id="btnClearFrame" class="icon-btn" title="Clear this frame's annotations">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>

    <!-- ANNOTATION COUNTER -->
    <div class="status-bar">
      <span id="annotationCount">0 annotations</span>
      <span id="frameAnnotationHint" class="hidden">● This frame has annotations</span>
      <span id="fpsIndicator" class="fps-indicator"></span>
    </div>

  </main>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script src="app.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
